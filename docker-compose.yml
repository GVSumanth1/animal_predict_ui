version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXT_PUBLIC_PREDICTION_SERVICE_URL=http://prediction-service:5000
      - PREDICTION_SERVICE_URL=http://prediction-service:5000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      - prediction-service
    networks:
      - animal-predic-network
    restart: unless-stopped

  prediction-service:
    # Replace with your prediction service image
    image: prediction-service:latest
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    networks:
      - animal-predic-network
    restart: unless-stopped

networks:
  animal-predic-network:
    driver: bridge