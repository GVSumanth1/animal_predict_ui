apiVersion: apps/v1
kind: Deployment
metadata:
  name: animal-predict
  namespace: animal-predict
  labels:
    app: animal-predict
spec:
  replicas: 3
  selector:
    matchLabels:
      app: animal-predict
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: animal-predict
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      containers:
      - name: animal-predict
        image: DOCKER_IMAGE  # Replaced by CI/CD pipeline
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http

        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: animal-predict-config
              key: NODE_ENV
        - name: NEXTAUTH_URL
          valueFrom:
            configMapKeyRef:
              name: animal-predict-config
              key: NEXTAUTH_URL
        - name: PREDICTION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: animal-predict-config
              key: PREDICTION_SERVICE_URL
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: animal-predict-secret
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: animal-predict-secret
              key: GOOGLE_CLIENT_SECRET
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: animal-predict-secret
              key: NEXTAUTH_SECRET

        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.next

      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - animal-predict
              topologyKey: kubernetes.io/hostname